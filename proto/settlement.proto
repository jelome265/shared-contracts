syntax = "proto3";

package com.company.payments.shared;

option java_multiple_files = true;
option java_package = "com.company.payments.shared.proto";

message SettlementJob {
    string job_id = 1;
    string provider = 2;
    string date = 3;
    bool batch_mode = 4;
}

message SettlementResult {
    string job_id = 1;
    int32 processed_count = 2;
    string status = 3;
}
